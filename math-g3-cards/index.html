<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7fbff" />
    <title>大学受験数学 公式カード</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["\\(", "\\)"], ["$", "$"]],
          displayMath: [["\\[", "\\]"]],
          processEscapes: true
        },
        svg: { fontCache: "global" }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">大学受験数学</p>
          <h1>公式カード</h1>
        </div>
        <div class="top-status">
          <span id="cloudStatus" class="sync-pill">端末保存</span>
          <span id="todayDue" class="due-pill">0</span>
        </div>
      </header>

      <nav class="view-tabs" aria-label="表示切り替え">
        <button class="tab-button is-active" type="button" data-view="formulas">公式</button>
        <button class="tab-button" type="button" data-view="study">問題</button>
        <button class="tab-button" type="button" data-view="progress">進度</button>
      </nav>

      <main>
        <section id="formulasView" class="view-pane is-active">
          <div class="filter-band">
            <div id="listGenreFilter" class="dropdown-field"></div>
            <div id="listFrequencyFilter" class="dropdown-field"></div>
            <label class="search-field">
              <span>検索</span>
              <input id="formulaSearch" type="search" autocomplete="off" placeholder="例：ベクトル、判別式" />
            </label>
          </div>
          <div id="formulaCount" class="count-line"></div>
          <div id="formulaList" class="formula-list"></div>
        </section>

        <section id="studyView" class="view-pane">
          <div class="filter-band">
            <div id="studyGenreFilter" class="dropdown-field"></div>
            <div id="studyFrequencyFilter" class="dropdown-field"></div>
          </div>
          <div id="deckSummary" class="deck-summary"></div>
          <div id="studyCardMount" class="study-card-mount"></div>
        </section>

        <section id="progressView" class="view-pane">
          <div id="progressOverview" class="progress-overview"></div>
          <div id="progressBreakdown" class="progress-breakdown"></div>
          <div class="reset-row">
            <button id="resetProgress" class="ghost-button" type="button">進度リセット</button>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
