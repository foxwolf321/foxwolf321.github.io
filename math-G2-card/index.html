<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>関西私大理工系 数学公式カード</title>
  <meta name="description" content="大工大・立命館・関大・近大を中心にした理系数学公式確認とカード演習アプリ">
  <script>
    window.MathJax = {
      startup: { typeset: false },
      options: { enableMenu: false },
      chtml: { displayAlign: "left", displayIndent: "0" }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/mml-chtml.js"></script>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #607086;
      --line: #d8e0ea;
      --paper: #fbfcfe;
      --panel: #ffffff;
      --wash: #f1f6fb;
      --nav: #103f5e;
      --nav-2: #0f6b75;
      --accent: #b64632;
      --accent-2: #2f7d4f;
      --warn: #a15d00;
      --shadow: 0 12px 26px rgba(24, 45, 72, .10);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Yu Gothic UI", "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
      line-height: 1.7;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: #0d5f8c;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
      padding: 14px 0 10px;
      display: grid;
      gap: 12px;
    }

    .brand-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.18rem, 2.2vw, 1.75rem);
      line-height: 1.3;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: .92rem;
    }

    .status-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    .status-pill,
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 10px;
      background: #ffffff;
      color: #344256;
      font-size: .82rem;
      white-space: nowrap;
    }

    .badge.hot {
      border-color: #e3b5a8;
      background: #fff4ef;
      color: #8b3325;
    }

    .badge.green {
      border-color: #b9dbc8;
      background: #effaf3;
      color: #225c3b;
    }

    .badge.blue {
      border-color: #b8d4e5;
      background: #eef7fc;
      color: #155070;
    }

    .tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .tab-button {
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      padding: 8px 12px;
      min-width: max-content;
    }

    .tab-button[aria-selected="true"] {
      background: var(--nav);
      border-color: var(--nav);
      color: #ffffff;
    }

    main {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0 34px;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .grid-two {
      display: grid;
      grid-template-columns: minmax(280px, 385px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-title {
      margin: 0;
      font-size: 1rem;
      line-height: 1.4;
    }

    .panel-body {
      padding: 16px;
    }

    .filters {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field label {
      color: #445268;
      font-size: .84rem;
      font-weight: 700;
    }

    select,
    input[type="search"] {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--ink);
      padding: 8px 10px;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #ffffff;
      color: #3c4a5d;
      padding: 6px 10px;
      min-height: 34px;
      font-size: .86rem;
    }

    .chip.active {
      border-color: var(--nav-2);
      background: #eaf7f7;
      color: #0e5a62;
      font-weight: 700;
    }

    .chip.danger {
      border-color: #e0b2a8;
      background: #fff1ee;
      color: #933426;
    }

    .formula-list,
    .card-list,
    .weak-list {
      display: grid;
      gap: 10px;
    }

    .formula-item,
    .practice-card,
    .weak-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      padding: 12px;
      display: grid;
      gap: 8px;
      text-align: left;
    }

    .formula-item {
      width: 100%;
    }

    .formula-item.active {
      border-color: var(--nav-2);
      box-shadow: inset 4px 0 0 var(--nav-2);
    }

    .item-title {
      font-weight: 800;
      line-height: 1.45;
    }

    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: .82rem;
    }

    .formula-detail {
      display: grid;
      gap: 14px;
    }

    .detail-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .detail-title-row h2,
    .card-detail h2 {
      margin: 0;
      font-size: clamp(1.22rem, 2.4vw, 1.75rem);
      line-height: 1.35;
      letter-spacing: 0;
    }

    .formula-box,
    .math-box {
      background: var(--wash);
      border: 1px solid #cbd9e5;
      border-radius: var(--radius);
      padding: 14px;
      overflow-x: auto;
    }

    math {
      max-width: 100%;
      font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif;
      font-size: 1.18rem;
      line-height: 1.6;
    }

    .formula-box math,
    .math-box math {
      min-width: max-content;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .info-block {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: #ffffff;
    }

    .info-block h3 {
      margin: 0 0 6px;
      font-size: .9rem;
      color: #344256;
    }

    .info-block p,
    .info-block ul,
    .source-note p {
      margin: 0;
    }

    ul.clean {
      list-style: none;
      padding: 0;
      display: grid;
      gap: 5px;
    }

    ul.clean li::before {
      content: "・";
      color: var(--nav-2);
      font-weight: 800;
      margin-right: 2px;
    }

    .related-area {
      display: grid;
      gap: 8px;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .primary-button,
    .secondary-button,
    .plain-button {
      border-radius: var(--radius);
      min-height: 40px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: #26364a;
    }

    .primary-button {
      background: var(--nav);
      border-color: var(--nav);
      color: #ffffff;
      font-weight: 800;
    }

    .secondary-button {
      background: #eef7fc;
      border-color: #b9d5e7;
      color: #154f70;
    }

    .plain-button {
      background: #ffffff;
    }

    .practice-layout {
      display: grid;
      grid-template-columns: minmax(280px, 420px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .practice-card.active {
      border-color: var(--accent);
      box-shadow: inset 4px 0 0 var(--accent);
    }

    .card-detail {
      display: grid;
      gap: 14px;
    }

    .reveal-block {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      overflow: hidden;
    }

    .reveal-block h3 {
      margin: 0;
      padding: 10px 12px;
      background: #f7f9fc;
      border-bottom: 1px solid var(--line);
      font-size: .95rem;
    }

    .reveal-content {
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .reveal-content[hidden] {
      display: none;
    }

    ol.steps {
      margin: 0;
      padding-left: 1.35rem;
      display: grid;
      gap: 6px;
    }

    .source-note {
      background: #ffffff;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: .84rem;
      padding: 14px 0 22px;
    }

    .source-note .inner {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
      display: grid;
      gap: 6px;
    }

    .empty {
      border: 1px dashed #b9c6d4;
      border-radius: var(--radius);
      padding: 16px;
      color: var(--muted);
      background: #ffffff;
    }

    .mini-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      padding: 12px;
    }

    .stat strong {
      display: block;
      font-size: 1.45rem;
      line-height: 1.2;
    }

    .stat span {
      color: var(--muted);
      font-size: .82rem;
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      background: #183247;
      color: #ffffff;
      border-radius: var(--radius);
      padding: 10px 12px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: .18s ease;
      z-index: 20;
      max-width: min(360px, calc(100vw - 32px));
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 860px) {
      .brand-row,
      .detail-title-row {
        display: grid;
      }

      .status-stack {
        justify-content: flex-start;
      }

      .grid-two,
      .practice-layout,
      .info-grid {
        grid-template-columns: 1fr;
      }

      .mini-stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .topbar,
      main,
      .source-note .inner {
        width: min(100% - 20px, 1240px);
      }

      .panel-body,
      .panel-head {
        padding-left: 12px;
        padding-right: 12px;
      }

      math {
        font-size: 1.04rem;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <div class="topbar">
        <div class="brand-row">
          <div>
            <h1>関西私大理工系 数学公式カード</h1>
            <p class="subtitle">大工大・立命館・関大・近大を中心に、公式の確認と入試風カード演習をつなげます。</p>
          </div>
          <div class="status-stack" aria-label="データ状態">
            <span class="status-pill" id="formulaCount">公式 0</span>
            <span class="status-pill" id="cardCount">演習 0</span>
            <span class="status-pill" id="checkStatus">確認中</span>
          </div>
        </div>
        <nav class="tabs" aria-label="メインメニュー">
          <button class="tab-button" type="button" data-tab="formulas" aria-selected="true">公式確認</button>
          <button class="tab-button" type="button" data-tab="practice" aria-selected="false">大学別演習</button>
          <button class="tab-button" type="button" data-tab="review" aria-selected="false">カード復習</button>
          <button class="tab-button" type="button" data-tab="weakness" aria-selected="false">弱点リスト</button>
        </nav>
      </div>
    </header>

    <main>
      <section class="tab-panel active" id="tab-formulas" aria-labelledby="公式確認">
        <div class="grid-two">
          <aside class="panel">
            <div class="panel-head">
              <h2 class="panel-title">公式を探す</h2>
            </div>
            <div class="panel-body filters">
              <div class="field">
                <label for="formulaSearch">キーワード</label>
                <input id="formulaSearch" type="search" placeholder="例: 極限、判別式、ベクトル">
              </div>
              <div class="field">
                <label for="subjectSelect">科目</label>
                <select id="subjectSelect"></select>
              </div>
              <div class="field">
                <label for="unitSelect">単元</label>
                <select id="unitSelect"></select>
              </div>
              <div class="field">
                <label for="formulaSelect">公式</label>
                <select id="formulaSelect"></select>
              </div>
              <div class="field">
                <label>大学タグ</label>
                <div class="chip-row" id="formulaUniversityChips"></div>
              </div>
              <div class="formula-list" id="formulaList"></div>
            </div>
          </aside>
          <section class="panel">
            <div class="panel-body">
              <div class="formula-detail" id="formulaDetail"></div>
            </div>
          </section>
        </div>
      </section>

      <section class="tab-panel" id="tab-practice" aria-labelledby="大学別演習">
        <div class="practice-layout">
          <aside class="panel">
            <div class="panel-head">
              <h2 class="panel-title">入試風カード</h2>
            </div>
            <div class="panel-body filters">
              <div class="field">
                <label>大学タグ</label>
                <div class="chip-row" id="practiceUniversityChips"></div>
              </div>
              <div class="field">
                <label for="practiceSubject">科目</label>
                <select id="practiceSubject"></select>
              </div>
              <div class="field">
                <label for="practiceSearch">キーワード</label>
                <input id="practiceSearch" type="search" placeholder="例: 面積、漸化式、複素数">
              </div>
              <div class="card-list" id="practiceList"></div>
            </div>
          </aside>
          <section class="panel">
            <div class="panel-body">
              <div class="card-detail" id="cardDetail"></div>
            </div>
          </section>
        </div>
      </section>

      <section class="tab-panel" id="tab-review" aria-labelledby="カード復習">
        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">要復習カード</h2>
            <div class="action-row">
              <button class="secondary-button" type="button" id="randomReviewBtn">ランダム表示</button>
              <button class="plain-button" type="button" id="clearReviewBtn">全解除</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="mini-stats" id="reviewStats"></div>
            <div class="card-list" id="reviewList" style="margin-top: 14px;"></div>
          </div>
        </div>
      </section>

      <section class="tab-panel" id="tab-weakness" aria-labelledby="弱点リスト">
        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">単元別の弱点</h2>
            <button class="plain-button" type="button" id="resetProgressBtn">学習記録をリセット</button>
          </div>
          <div class="panel-body">
            <div class="mini-stats" id="weakStats"></div>
            <div class="weak-list" id="weakList" style="margin-top: 14px;"></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="source-note">
      <div class="inner">
        <p>入試範囲タグは2026年度公開情報を基準にした学習用整理です。最新の出願時条件は各大学の公式要項で確認してください。</p>
        <p>参照: <a href="https://www.oit.ac.jp/admission/exam/admission_guide.html">大阪工業大学</a>、<a href="https://ritsnet.ritsumei.jp/admission/general/method.html">立命館大学</a>、<a href="https://www.nyusi.kansai-u.ac.jp/admission/general/">関西大学</a>、<a href="https://kindai.jp/exam/system/general1_a/subject/">近畿大学</a></p>
      </div>
    </footer>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const universities = ["全大学", "共通頻出", "大工大", "立命館", "関大", "近大"];
    const allTargetUniversities = ["共通頻出", "大工大", "立命館", "関大", "近大"];
    const subjects = ["全科目", "数学I", "数学A", "数学II", "数学B", "数学C", "数学III"];

    const esc = (value) => String(value).replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[char]));
    const mi = (value) => `<mi>${esc(value)}</mi>`;
    const mn = (value) => `<mn>${esc(value)}</mn>`;
    const mo = (value) => `<mo>${esc(value)}</mo>`;
    const mt = (value) => `<mtext>${esc(value)}</mtext>`;
    const row = (...items) => `<mrow>${items.join("")}</mrow>`;
    const math = (...items) => `<math xmlns="http://www.w3.org/1998/Math/MathML" display="block">${row(...items)}</math>`;
    const frac = (top, bottom) => `<mfrac><mrow>${top}</mrow><mrow>${bottom}</mrow></mfrac>`;
    const sup = (base, power) => `<msup><mrow>${base}</mrow><mrow>${power}</mrow></msup>`;
    const sub = (base, lower) => `<msub><mrow>${base}</mrow><mrow>${lower}</mrow></msub>`;
    const subsup = (base, lower, upper) => `<msubsup><mrow>${base}</mrow><mrow>${lower}</mrow><mrow>${upper}</mrow></msubsup>`;
    const sqrt = (value) => `<msqrt><mrow>${value}</mrow></msqrt>`;
    const abs = (value) => row(mo("|"), value, mo("|"));
    const vec = (value) => `<mover>${mi(value)}<mo>→</mo></mover>`;
    const lim = (lower, value) => row(`<munder>${mo("lim")}<mrow>${lower}</mrow></munder>`, value);
    const sum = (lower, upper, value) => row(subsup(mo("Σ"), lower, upper), value);
    const integ = (lower, upper, value, variable = "x") => row(subsup(mo("∫"), lower, upper), value, row(mi("d"), mi(variable)));
    const inline = (...items) => `<span class="math-inline">${math(...items)}</span>`;

    const F = (entry) => ({
      reading: "",
      conditions: "高校数学の標準範囲で用いる。",
      example: "関連カードで入試風の使い方を確認する。",
      relatedIds: [],
      tags: [],
      universities: allTargetUniversities,
      priority: "標準",
      difficulty: "標準",
      ...entry
    });

    const C = (entry) => ({
      tags: [],
      universities: allTargetUniversities,
      difficulty: "標準",
      pattern: "標準処理",
      ...entry
    });

    const formulaData = [
      F({
        id: "i-factor-diff-square",
        subject: "数学I",
        unit: "数と式",
        title: "平方差と展開公式",
        formula: math(row(mo("("), mi("a"), mo("+"), mi("b"), mo(")"), row(mo("("), mi("a"), mo("-"), mi("b"), mo(")")), mo("="), sup(mi("a"), mn("2")), mo("-"), sup(mi("b"), mn("2")))),
        whenToUse: "二次式を素早く因数分解し、方程式・不等式・極限の前処理を軽くする。",
        signals: ["二乗の差が見える", "分母の有理化", "式を簡単にしてから代入したい"],
        pitfalls: "符号の取り違えで中間項を残さない。和と差が対になっているか確認する。",
        tags: ["因数分解", "計算整理"]
      }),
      F({
        id: "i-quadratic-formula",
        subject: "数学I",
        unit: "数と式",
        title: "二次方程式の解の公式",
        formula: math(mi("x"), mo("="), frac(row(mo("-"), mi("b"), mo("±"), sqrt(row(sup(mi("b"), mn("2")), mo("-"), mn("4"), mi("a"), mi("c")))), row(mn("2"), mi("a")))),
        conditions: math(mi("a"), mo("≠"), mn("0")),
        whenToUse: "因数分解しにくい二次方程式の根、接線条件、判別式の確認で使う。",
        signals: ["二次式が因数分解しにくい", "根を具体的に求める", "パラメータ入りの交点"],
        pitfalls: "判別式の中身を先に整理し、分母の 2a を最後まで落とさない。",
        tags: ["二次方程式", "根"]
      }),
      F({
        id: "i-discriminant",
        subject: "数学I",
        unit: "二次関数",

      activeTab: "formulas",

      revealed: new Set(),

    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => [...document.querySelectorAll(selector)];

    function loadProgress() {
      try {
        return JSON.parse(localStorage.getItem("kansaiMathProgress") || "{}");
      } catch {
        return {};
      }
    }

    function saveProgress() {
      localStorage.setItem("kansaiMathProgress", JSON.stringify(state.progress));
    }

    function formulaById(id) {
      return formulaData.find((item) => item.id === id);
    }

    function cardById(id) {
      return cardData.find((item) => item.id === id);
    }

    function subjectUnits(subject) {
      const source = subject === "全科目" ? formulaData : formulaData.filter((item) => item.subject === subject);
      return ["全単元", ...new Set(source.map((item) => item.unit))];
    }

    function optionList(select, values, current) {
      select.innerHTML = values.map((value) => `<option value="${esc(value)}"${value === current ? " selected" : ""}>${esc(value)}</option>`).join("");
    }

    function chipList(container, current, handler) {
      container.innerHTML = universities.map((name) => `<button class="chip${name === current ? " active" : ""}" type="button" data-university="${esc(name)}">${esc(name)}</button>`).join("");
      container.querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => handler(button.dataset.university));
      });
    }

    function listItems(items) {
      if (!items || !items.length) return "<p>なし</p>";
      return `<ul class="clean">${items.map((item) => `<li>${esc(item)}</li>`).join("")}</ul>`;
    }

    function badges(items, style = "") {
      return items.map((item) => `<span class="badge ${style}">${esc(item)}</span>`).join("");
    }

    function typeMath() {
      if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise().catch(() => {});
      }
    }

    function matchesUniversity(item, selected) {
      return selected === "全大学" || item.universities.includes(selected);
    }

    function filteredFormulas() {
      const subject = $("#subjectSelect").value || "全科目";
      const unit = $("#unitSelect").value || "全単元";
      const search = ($("#formulaSearch").value || "").trim().toLowerCase();
      return formulaData.filter((item) => {
        const targetText = [
          item.title,
          item.subject,
          item.unit,
          item.whenToUse,
          item.pitfalls,
          ...item.signals,
          ...item.tags,
          ...item.universities
        ].join(" ").toLowerCase();
        return (subject === "全科目" || item.subject === subject)
          && (unit === "全単元" || item.unit === unit)
          && matchesUniversity(item, state.formulaUniversity)
          && (!search || targetText.includes(search));
      });
    }

    function renderFormulaControls() {
      const subject = $("#subjectSelect").value || "全科目";
      optionList($("#subjectSelect"), subjects, subject);
      optionList($("#unitSelect"), subjectUnits(subject), $("#unitSelect").value || "全単元");
      const formulas = filteredFormulas();
      const currentExists = formulas.some((item) => item.id === state.activeFormulaId);
      if (!currentExists && formulas[0]) state.activeFormulaId = formulas[0].id;
      $("#formulaSelect").innerHTML = formulas.map((item) => `<option value="${esc(item.id)}"${item.id === state.activeFormulaId ? " selected" : ""}>${esc(item.title)}</option>`).join("");
      chipList($("#formulaUniversityChips"), state.formulaUniversity, (value) => {
        state.formulaUniversity = value;
        renderFormulaArea();
      });
    }

    function renderFormulaList() {
      const formulas = filteredFormulas();
      const list = $("#formulaList");
      if (!formulas.length) {
        list.innerHTML = `<div class="empty">条件に合う公式がありません。</div>`;
        return;
      }
      list.innerHTML = formulas.map((item) => `
        <button class="formula-item${item.id === state.activeFormulaId ? " active" : ""}" type="button" data-formula-id="${esc(item.id)}">

      });

      renderFormulaControls();
      renderFormulaList();
      renderFormulaDetail();

    function filteredCards() {
      const subject = $("#practiceSubject").value || "全科目";
      const search = ($("#practiceSearch").value || "").trim().toLowerCase();
      return cardData.filter((card) => {
        const linkedTitles = card.formulaIds.map((id) => formulaById(id)?.title || "").join(" ");
        const text = [
          card.title,
          card.subject,
          card.unit,
          card.goal,
          card.hint1,
          card.pattern,
          linkedTitles,
          ...card.universities,

        renderPracticeArea();

      const cards = filteredCards();
      if (!cards.some((card) => card.id === state.activeCardId) && cards[0]) {
        state.activeCardId = cards[0].id;
        state.revealed.clear();
      }
      const list = $("#practiceList");
      if (!cards.length) {
        list.innerHTML = `<div class="empty">条件に合うカードがありません。</div>`;
        return;
      }
      list.innerHTML = cards.map((card) => {
        const mark = state.progress[card.id]?.review ? `<span class="badge hot">要復習</span>` : "";
        return `
          <button class="practice-card${card.id === state.activeCardId ? " active" : ""}" type="button" data-card-id="${esc(card.id)}">

    function revealSection(key) {
      state.revealed.add(key);
      renderCardDetail();
    }

    function markCard(cardId, review) {
      const current = state.progress[cardId] || { solved: 0, reviewCount: 0 };
      if (review) {
        current.review = true;
        current.reviewCount = (current.reviewCount || 0) + 1;
        showToast("要復習に入れました。");
      } else {
        current.review = false;
        current.solved = (current.solved || 0) + 1;
        showToast("できたカードとして記録しました。");
      }
      current.lastTouched = new Date().toISOString();
      state.progress[cardId] = current;
      saveProgress();
      renderPracticeArea();
      renderReview();
      renderWeakness();
    }

      const list = $("#reviewList");
      if (!cards.length) {
        list.innerHTML = `<div class="empty">まだ要復習カードはありません。演習で「要復習」を押すとここに集まります。</div>`;
        return;
      }
      list.innerHTML = cards.map((card) => `
        <button class="practice-card" type="button" data-review-card="${esc(card.id)}">
          <span class="item-title">${esc(card.title)}</span>
          <span class="item-meta">${esc(card.subject)} / ${esc(card.unit)} / ${esc(card.pattern)}</span>
          <span class="item-meta">${badges(card.universities.slice(0, 4), "blue")}</span>
        </button>
      `).join("");
      list.querySelectorAll("[data-review-card]").forEach((button) => {
        button.addEventListener("click", () => {
          state.activeCardId = button.dataset.reviewCard;
          state.revealed.clear();
          switchTab("practice");
          renderPracticeArea();
        });
      });
    }

    function weaknessRows() {
      const review = reviewCards();
      const map = new Map();
      review.forEach((card) => {
        const key = `${card.subject} / ${card.unit}`;
        if (!map.has(key)) map.set(key, { key, count: 0, formulas: new Set(), cards: [] });
        const rowData = map.get(key);
        rowData.count += 1;
        card.formulaIds.forEach((id) => rowData.formulas.add(formulaById(id)?.title || id));
        rowData.cards.push(card.title);
      });
      return [...map.values()].sort((a, b) => b.count - a.count);
    }

    function renderWeakness() {
      const rows = weaknessRows();
      const review = reviewCards();
      const touched = Object.keys(state.progress).length;
      renderStats($("#weakStats"), [
        { label: "記録済みカード", value: touched },
        { label: "弱点単元", value: rows.length },
        { label: "要復習", value: review.length },
        { label: "大学タグ", value: "4校" }
      ]);
      const list = $("#weakList");
      if (!rows.length) {
        list.innerHTML = `<div class="empty">弱点はまだ記録されていません。迷ったカードを「要復習」に入れると、単元と公式で整理されます。</div>`;
        return;
      }
      list.innerHTML = rows.map((rowData) => `
        <div class="weak-item">
          <div class="item-title">${esc(rowData.key)} <span class="badge hot">要復習 ${rowData.count}</span></div>
          <div><strong>関連公式:</strong> ${[...rowData.formulas].map((name) => `<span class="badge">${esc(name)}</span>`).join(" ")}</div>
          <div><strong>カード:</strong> ${rowData.cards.map(esc).join("、")}</div>
        </div>
      `).join("");
    }

    function switchTab(name) {
      state.activeTab = name;
      $$(".tab-button").forEach((button) => {
        const active = button.dataset.tab === name;
        button.setAttribute("aria-selected", active ? "true" : "false");
      });
      $$(".tab-panel").forEach((panel) => {
        panel.classList.toggle("active", panel.id === `tab-${name}`);
      });
      if (name === "review") renderReview();
      if (name === "weakness") renderWeakness();
      typeMath();
    }

    function dataCheck() {
      const formulaIds = new Set(formulaData.map((item) => item.id));
      const cardIds = new Set(cardData.map((item) => item.id));
      const duplicateFormulaIds = formulaData.length - formulaIds.size;
      const duplicateCardIds = cardData.length - cardIds.size;
      const missing = cardData.flatMap((card) => card.formulaIds.filter((id) => !formulaIds.has(id)).map((id) => `${card.id}:${id}`));
      const status = $("#checkStatus");
      if (duplicateFormulaIds || duplicateCardIds || missing.length) {
        status.textContent = `要確認 ${duplicateFormulaIds + duplicateCardIds + missing.length}`;
        status.style.borderColor = "#df9d8e";
        status.style.background = "#fff2ee";
      } else {
        status.textContent = "データチェック OK";
        status.style.borderColor = "#b9dbc8";
        status.style.background = "#effaf3";
      }
    }

    function showToast(message) {
      const toast = $("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function boot() {
      $("#formulaCount").textContent = `公式 ${formulaData.length}`;
      $("#cardCount").textContent = `演習 ${cardData.length}`;
      optionList($("#subjectSelect"), subjects, "全科目");
      optionList($("#unitSelect"), subjectUnits("全科目"), "全単元");
      optionList($("#practiceSubject"), subjects, "全科目");
      $$(".tab-button").forEach((button) => {
        button.addEventListener("click", () => switchTab(button.dataset.tab));
      });
      $("#subjectSelect").addEventListener("change", () => {
        optionList($("#unitSelect"), subjectUnits($("#subjectSelect").value), "全単元");
        renderFormulaArea();
      });
      $("#unitSelect").addEventListener("change", renderFormulaArea);
      $("#formulaSearch").addEventListener("input", renderFormulaArea);
      $("#formulaSelect").addEventListener("change", (event) => {
        state.activeFormulaId = event.target.value;
        renderFormulaArea();
      });
      $("#practiceSubject").addEventListener("change", renderPracticeArea);
      $("#practiceSearch").addEventListener("input", renderPracticeArea);
      $("#randomReviewBtn").addEventListener("click", () => {
        const cards = reviewCards();
        if (!cards.length) {
          showToast("要復習カードがまだありません。");
          return;
        }
        const card = cards[Math.floor(Math.random() * cards.length)];
        state.activeCardId = card.id;
        state.revealed.clear();
        switchTab("practice");
        renderPracticeArea();
      });
      $("#clearReviewBtn").addEventListener("click", () => {
        Object.keys(state.progress).forEach((id) => {
          state.progress[id].review = false;
        });
        saveProgress();
        renderReview();
        renderWeakness();
        renderPracticeArea();
        showToast("要復習を全解除しました。");
      });
      $("#resetProgressBtn").addEventListener("click", () => {
        state.progress = {};
        saveProgress();
        renderReview();
        renderWeakness();
        renderPracticeArea();
        showToast("学習記録をリセットしました。");
      });
      dataCheck();
      renderFormulaArea();
      renderPracticeArea();
      renderReview();
      renderWeakness();
      window.addEventListener("load", typeMath);
    }

    boot();
  </script>
</body>
</html>
