<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>物理受験カード v3.0 UI微修正パッチャー</title>
<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#fff7fb;color:#203047;margin:0;padding:24px;line-height:1.7}.box{max-width:760px;margin:auto;background:rgba(255,255,255,.86);border:1px solid #f0dbe8;border-radius:24px;padding:22px;box-shadow:0 14px 34px rgba(40,58,92,.12)}h1{font-size:24px;margin:0 0 10px}button{border:0;border-radius:16px;background:#f29ac1;color:#fff;font-weight:800;padding:12px 18px;font-size:15px}input{display:block;margin:16px 0;padding:12px;background:#fff;border:1px solid #ead8e3;border-radius:14px;width:100%;box-sizing:border-box}.log{white-space:pre-wrap;background:#f7fbff;border-radius:16px;padding:14px;margin-top:14px;font-size:13px}.warn{background:#fff4d6;border-radius:14px;padding:12px;margin:14px 0}.ok{color:#177245;font-weight:800}.ng{color:#b42318;font-weight:800}code{background:#f3edf5;border-radius:8px;padding:2px 6px}</style>
</head>
<body>
<div class="box">
  <h1>物理受験カード v3.0 UI微修正パッチャー</h1>
  <p>GitHubからダウンロードした <code>physics-g-cards/index.html</code> を選ぶと、トップ上部余白・背景透かし・空アイコンだけを修正した <code>index.patched.html</code> を保存します。</p>
  <div class="warn">カード本文、公式データ、進捗、Drive保存ロジックには触りません。</div>
  <input id="file" type="file" accept=".html,text/html">
  <button id="run">パッチ済み index.html を作る</button>
  <div id="log" class="log">まだ実行していません。</div>
</div>
<script>
const replacements = [
['opacity:.72;z-index:-3}body::after{content:"";position:fixed;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.18) 35%,rgba(255,247,252,.48) 75%,rgba(255,255,255,.66));z-index:-2}.app{max-width:780px;margin:0 auto;padding:18px 16px 100px}.topbar{display:flex;justify-content:space-between;align-items:center;margin:4px 0 14px}','opacity:.38;z-index:-3}body::after{content:"";position:fixed;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.78) 0%,rgba(255,255,255,.66) 28%,rgba(255,247,252,.72) 68%,rgba(255,255,255,.84));z-index:-2}.app{max-width:780px;margin:0 auto;padding:10px 16px 100px}.topbar{display:flex;justify-content:space-between;align-items:center;margin:0 0 8px}.topbar>div:last-child{display:flex;gap:8px;align-items:center}','背景透かしを薄くし、ページ最上部の余白を圧縮'],
['.iconbtn{border:0;border-radius:50%;width:46px;height:46px;background:rgba(255,255,255,.82);box-shadow:0 8px 20px rgba(40,58,92,.14);font-size:22px}','.iconbtn{border:0;border-radius:50%;width:42px;height:42px;background:rgba(255,255,255,.86);box-shadow:0 8px 18px rgba(40,58,92,.12);font-size:20px;display:grid;place-items:center}','上部丸ボタンを少し小さくして中央揃え'],
['.hero{position:relative;border-radius:34px;padding:24px 20px 20px;background:rgba(255,255,255,.72);','.hero{position:relative;border-radius:32px;padding:18px 18px 18px;background:rgba(255,255,255,.84);','ヒーローカードの上余白と透過を調整'],
['.hero::after{content:"♡";position:absolute;right:26px;top:98px;font-size:40px;color:#ef9fbe;transform:rotate(-8deg)}','.hero::after{content:"♡";position:absolute;right:22px;top:84px;font-size:34px;color:#ef9fbe;transform:rotate(-8deg);opacity:.72}','装飾ハートを控えめに調整'],
['.hero-row{display:flex;gap:16px;align-items:center}.appicon{width:78px;height:78px;border-radius:22px;','.hero-row{display:flex;gap:14px;align-items:center}.appicon{width:70px;height:70px;border-radius:20px;','タイトル行の密度を調整'],
['h1{font-size:clamp(29px,7.5vw,45px);line-height:1.13;','h1{font-size:clamp(27px,7vw,42px);line-height:1.12;','タイトルをわずかに小さくする'],
['.sub{font-size:14px;color:#4e5f79;line-height:1.7;margin:10px 0 0}.actions{display:grid;grid-template-columns:1.12fr 1fr 1fr;gap:12px;margin-top:18px}.act{border:0;border-radius:23px;min-height:88px;padding:15px;','.sub{font-size:14px;color:#4e5f79;line-height:1.6;margin:8px 0 0}.actions{display:grid;grid-template-columns:1.12fr 1fr 1fr;gap:10px;margin-top:14px}.act{border:0;border-radius:21px;min-height:76px;padding:13px;','説明文と主要ボタンの縦余白を圧縮'],
['@media(max-width:520px){.app{padding:12px 12px 94px}.hero{padding:20px 14px 16px}.hero-row{align-items:flex-start}.appicon{width:66px;height:66px;border-radius:18px}.actions{grid-template-columns:1fr 1fr}.actions .primary{grid-column:1/-1}.dash{grid-template-columns:1fr}.ring{margin:auto}.stat b{font-size:22px}.fcard{grid-template-columns:1fr}.eval{grid-template-columns:repeat(2,1fr)}}','@media(max-width:520px){.app{padding:8px 12px 94px}.topbar{margin-bottom:7px}.chip{padding:7px 10px;font-size:12px}.iconbtn{width:40px;height:40px}.hero{padding:16px 13px 14px}.hero-row{align-items:flex-start;gap:11px}.appicon{width:58px;height:58px;border-radius:16px}h1{font-size:clamp(25px,7vw,38px)}.sub{font-size:13px;line-height:1.55;margin-top:7px}.actions{grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}.actions .primary{grid-column:1/-1}.act{min-height:70px;padding:12px}.dash{grid-template-columns:1fr}.ring{margin:auto}.stat b{font-size:22px}.fcard{grid-template-columns:1fr}.eval{grid-template-columns:repeat(2,1fr)}}','スマホ幅での上部余白とボタン高さを調整'],
['<button class="iconbtn" data-action="toast" data-msg="年間固定版です。今後は誤字・エラー補修中心にします。"></button>','<button class="iconbtn" data-action="toast" data-msg="年間固定版です。今後は誤字・エラー補修中心にします。" aria-label="この版について">ℹ️</button>','空の情報ボタンにアイコンを追加'],
['<button class="act" data-action="switch" data-view="formulas"><span></span>公式集を開く</button>','<button class="act" data-action="switch" data-view="formulas"><span>∑</span>公式集を開く</button>','公式集ボタンの空アイコンを補正'],
['<button class="act" data-action="switch" data-view="progress"><span></span>進捗を見る</button>','<button class="act" data-action="switch" data-view="progress"><span>✓</span>進捗を見る</button>','進捗ボタンの空アイコンを補正'],
['<button class="nav active" data-action="switch" data-view="learn"><i></i>学習</button>','<button class="nav active" data-action="switch" data-view="learn"><i>▣</i>学習</button>','下部ナビ 学習アイコン補正'],
['<button class="nav" data-action="switch" data-view="formulas"><i></i>公式集</button>','<button class="nav" data-action="switch" data-view="formulas"><i>∑</i>公式集</button>','下部ナビ 公式集アイコン補正'],
['<button class="nav" data-action="switch" data-view="search"><i></i>検索</button>','<button class="nav" data-action="switch" data-view="search"><i>⌕</i>検索</button>','下部ナビ 検索アイコン補正'],
['<button class="nav" data-action="switch" data-view="progress"><i></i>進捗</button>','<button class="nav" data-action="switch" data-view="progress"><i>✓</i>進捗</button>','下部ナビ 進捗アイコン補正']
];
function download(name, text){const blob=new Blob([text],{type:'text/html;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href);}
document.getElementById('run').onclick = async () => {
 const f=document.getElementById('file').files[0];
 const log=document.getElementById('log');
 if(!f){log.innerHTML='<span class="ng">index.html を選んでください。</span>';return;}
 let text=await f.text();
 let out=[];
 if(!text.includes('物理受験カード v3.0｜年間固定版')) out.push('WARNING: v3.0.0 年間固定版ではない可能性があります。');
 let missing=[];
 for(const [oldv,newv,label] of replacements){
   if(text.includes(oldv)){text=text.replace(oldv,newv);out.push('OK: '+label);} else if(text.includes(newv)){out.push('済: '+label);} else {missing.push(label);}
 }
 download('index.patched.html', text);
 if(missing.length){out.push('\n見つからなかった項目:'); missing.forEach(x=>out.push(' - '+x)); out.push('不足が多い場合は、GitHub側の index.html が変わっています。');}
 log.textContent=out.join('\n');
};
</script>
</body>
</html>
